name: Deploy to Staging

on:
  push:
    branches: ['develop']
    paths:
      - 'apps/web/**'
      - 'apps/worker/**'
      - 'apps/realtime/**'
      - 'packages/**'
      - 'docker-compose.staging.yml'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy-staging.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (GitHub runner)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR (GitHub runner)
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Sentry Project/DSN Alignment (staging)
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          for v in NEXT_PUBLIC_SENTRY_DSN SENTRY_ORG SENTRY_PROJECT SENTRY_AUTH_TOKEN; do
            if [ -z "${!v:-}" ]; then
              echo "Missing required Sentry value: $v"
              exit 1
            fi
          done

          KEYS_JSON=$(curl -sSf \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            "https://sentry.io/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/keys/")

          python3 -c 'import json, os, sys; dsn=os.environ["NEXT_PUBLIC_SENTRY_DSN"]; keys=json.loads(os.environ["KEYS_JSON"]); pk=dsn.split("://",1)[1].split("@",1)[0]; ok=any(k.get("public")==pk for k in keys); print("Sentry DSN matches target project key." if ok else "Sentry DSN key does not belong to configured SENTRY_ORG/SENTRY_PROJECT."); sys.exit(0 if ok else 1)'

      - name: Build & Push Backend Image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app-runner
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/guards-backend:app-${{ github.sha }}-${{ github.run_id }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          build-args: |
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ENVIRONMENT=staging
            CI=true
            SENTRY_LOG_LEVEL=debug
            SENTRY_UPLOAD_STRICT=1

      - name: Build & Push Worker Image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker-runner
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/guards-backend:worker-${{ github.sha }}-${{ github.run_id }}
          cache-from: |
            type=gha,scope=app
            type=gha,scope=worker
          cache-to: type=gha,mode=min,scope=worker

      - name: Build & Push Realtime Image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: realtime-runner
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/guards-backend:realtime-${{ github.sha }}-${{ github.run_id }}
          cache-from: |
            type=gha,scope=app
            type=gha,scope=realtime
          cache-to: type=gha,mode=min,scope=realtime

      - name: Build & Push Migration Image (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migration-runner
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/guards-backend:migration-${{ github.sha }}-${{ github.run_id }}
          cache-from: |
            type=gha,scope=app
            type=gha,scope=migration
          cache-to: type=gha,mode=min,scope=migration

      - name: Copy staging docker-compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: 'docker-compose.staging.yml'
          target: '/home/${{ secrets.EC2_USER }}/staging-deploy'

      - name: Deploy staging on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/guards/staging
            cp /home/${{ secrets.EC2_USER }}/staging-deploy/docker-compose.staging.yml /opt/guards/staging/docker-compose.staging.yml
            cd /opt/guards/staging

            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Persist image metadata for restarts; keep application secrets in .env.staging
            touch .env.staging
            sed -i '/^ECR_REGISTRY=/d' .env.staging
            sed -i '/^IMAGE_TAG=/d' .env.staging
            echo "ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}" >> .env.staging
            echo "IMAGE_TAG=${{ github.sha }}-${{ github.run_id }}" >> .env.staging

            export ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            export IMAGE_TAG="${{ github.sha }}-${{ github.run_id }}"

            docker compose -f docker-compose.staging.yml --profile migration pull
            docker compose -f docker-compose.staging.yml --profile migration run --rm migration
            docker compose -f docker-compose.staging.yml up -d --remove-orphans app worker realtime

            docker image prune -af
