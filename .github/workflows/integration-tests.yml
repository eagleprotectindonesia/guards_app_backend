name: Integration Tests

on:
  pull_request:
    branches: ['main', 'develop']
  push:
    branches: ['main']
  schedule:
    - cron: '0 1 * * *'

jobs:
  integration-smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/guards_app_test
      REDIS_URL: redis://localhost:6379/1
      API_BASE_URL: http://localhost:3000
      NODE_ENV: test
      JWT_SECRET: test-secret-key-for-ci
      JWT_EXPIRES_IN: 7d
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Postgres and Redis
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for services
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.test.yml ps | grep -q "(healthy)"; then
              break
            fi
            sleep 2
          done
          docker compose -f docker-compose.test.yml ps

      - name: Apply Prisma schema
        run: pnpm turbo run db:push --filter=@repo/database

      - name: Run integration smoke tests
        run: pnpm test:integration:smoke

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  integration-full:
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/guards_app_test
      REDIS_URL: redis://localhost:6379/1
      API_BASE_URL: http://localhost:3000
      NODE_ENV: test
      JWT_SECRET: test-secret-key-for-ci
      JWT_EXPIRES_IN: 7d
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Postgres and Redis
        run: docker compose -f docker-compose.test.yml up -d

      - name: Apply Prisma schema
        run: pnpm turbo run db:push --filter=@repo/database

      - name: Run full integration tests
        run: pnpm test:integration:full

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
